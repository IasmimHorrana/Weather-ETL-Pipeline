#   MinIO (Bronze/Silver) + PostgreSQL (Gold) + pgAdmin
#   + Airflow Webserver + Airflow Scheduler

# Âncora YAML: variáveis e volumes compartilhados pelos serviços Airflow.
# Evita repetição entre webserver e scheduler.
x-airflow-common: &airflow-common
  build:
    context: .. # Raiz do projeto (para copiar src/ no futuro)
    dockerfile: infra/airflow/Dockerfile # Nossa imagem com as libs instaladas
  env_file:
    - ../config/.env # Lê MINIO_*, POSTGRES_*, TELEGRAM_* etc.
  environment:
    # ── Executor ──────────────────────────────────────────────
    AIRFLOW__CORE__EXECUTOR: LocalExecutor

    # ── Metadata DB (banco interno do Airflow — airflow_db) ───
    # Usa o mesmo Postgres container, mas banco separado do weather_db.
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://weather_user:weather_pass@postgres:5432/airflow_db

    # ── DAGs ──────────────────────────────────────────────────
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__LOAD_EXAMPLES: "false" # Não mostrar os DAGs de exemplo

    # ── Segurança ─────────────────────────────────────────────
    # Em produção, gere com: python -c "import secrets; print(secrets.token_hex(32))"
    AIRFLOW__WEBSERVER__SECRET_KEY: weather_local_dev_secret_key

    # ── Logging ───────────────────────────────────────────────
    AIRFLOW__LOGGING__LOG_LEVEL: INFO

    # ── Python Path ───────────────────────────────────────────
    # Permite que as tasks importem de src.* (ex: from src.extract import ...)
    # O volume ../src:/opt/airflow/src monta o código, mas o Python precisa
    # saber que deve procurar módulos a partir de /opt/airflow/.
    PYTHONPATH: /opt/airflow

    # ── Endereços internos da rede Docker ─────────────────────
    # Dentro de um container, "localhost" aponta para o próprio container.
    # Para falar com MinIO e Postgres, usamos o NOME DO SERVIÇO como hostname.
    # Isso sobrescreve os valores do .env (que têm localhost e funcionam
    # apenas quando rodando scripts fora do Docker, no terminal).
    MINIO_ENDPOINT: http://minio:9000
    DATABASE_URL: postgresql://weather_user:weather_pass@postgres:5432/weather_db

  volumes:
    # DAGs: o Scheduler lê desta pasta para montar o grafo
    - ../dags:/opt/airflow/dags
    # Código-fonte: permite que as tasks importem de src.*
    - ../src:/opt/airflow/src
    # Logs: persiste os logs de execução entre reinicios
    - airflow_logs:/opt/airflow/logs

  depends_on:
    postgres:
      condition: service_healthy # Airflow só sobe depois que o Postgres estiver pronto
    minio:
      condition: service_healthy # Airflow precisa do MinIO para extract/transform

  networks:
    - weather_network

services:

  # ─────────────────────────────────────────
  # SERVIÇO: minio
  # ─────────────────────────────────────────
  # Object storage S3-compatível para Bronze e Silver.
  minio:
    image: minio/minio:latest
    container_name: weather_minio
    restart: unless-stopped
    env_file:
      - ../config/.env
    ports:
      - "9000:9000" # API S3 (boto3)
      - "9001:9001" # Console Web (localhost:9001)
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_network

  # ─────────────────────────────────────────
  # SERVIÇO: postgres
  # ─────────────────────────────────────────
  # Banco central: weather_db (dados de clima) + airflow_db (metadata do Airflow).
  postgres:
    image: postgres:15-alpine
    container_name: weather_postgres
    restart: unless-stopped
    env_file:
      - ../config/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # roda PRIMEIRO (ordem alfabética): cria o airflow_db
      - ./postgres/00_init_airflow.sh:/docker-entrypoint-initdb.d/00_init_airflow.sh
      # roda DEPOIS: cria as tabelas e índices do weather_db
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U weather_user -d weather_db" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_network

  # ─────────────────────────────────────────
  # SERVIÇO: pgadmin
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: weather_pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - weather_network

  # ─────────────────────────────────────────
  # SERVIÇO: airflow-init
  # ─────────────────────────────────────────
  # Serviço efêmero (roda e morre). Responsável por:
  #   1. Aplicar as migrações do metadata DB (airflow_db)
  #   2. Criar o usuário admin padrão para o Webserver
  airflow-init:
    <<: *airflow-common
    container_name: weather_airflow_init
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db upgrade
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname User \
          --role Admin \
          --email admin@weather.local \
          --password admin || true

  # ─────────────────────────────────────────
  # SERVIÇO: airflow-webserver
  # ─────────────────────────────────────────
  # Interface gráfica do Airflow.
  airflow-webserver:
    <<: *airflow-common
    container_name: weather_airflow_webserver
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully # Só sobe depois que o init terminar
      postgres:
        condition: service_healthy

  # ─────────────────────────────────────────
  # SERVIÇO: airflow-scheduler
  # ─────────────────────────────────────────
  # Lê a pasta dags/, monta o grafo e dispara
  # as tasks conforme o agendamento.
  airflow-scheduler:
    <<: *airflow-common
    container_name: weather_airflow_scheduler
    restart: unless-stopped
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

# =============================================================
# VOLUMES
# =============================================================
volumes:
  postgres_data:
  minio_data:
  pgadmin_data:
  airflow_logs:
    # Logs de execução das tasks do Airflow

    # =============================================================
    # NETWORKS
    # =============================================================
networks:
  weather_network:
    driver: bridge
    # Todos os serviços se comunicam pelo nome do serviço como hostname.
    # Ex: Airflow → Postgres via "postgres:5432" 
    #     Airflow → MinIO via "minio:9000"
